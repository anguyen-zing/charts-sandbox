<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>ZingGrid: Blank Grid</title>
  <script src="https://cdn.zingchart.com/zingchart.min.js"></script>
  <link rel="stylesheet" href="/hello-world/hello-world.css">
</head>

<body data-theme="vertical">
  
  <label id="chartOrientationToggle" class="switch">
    <input type="checkbox">
    <span class="slider round"></span>
    <p> Vertical Bar Chart </p>
  </label>

  <!-- CHART CONTAINER -->
  <div id="myChart" class="chart--container">
    <a class="zc-ref" href="https://www.zingchart.com">Powered by ZingChart</a>
  </div>

  <script src="/hello-world/hello-world.js"></script>
</body>
</html>
